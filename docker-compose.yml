version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: tramplin-db
    environment:
      POSTGRES_DB: tramplin
      POSTGRES_USER: tramplin_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tramplin_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tramplin_user -d tramplin"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: tramplin-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tramplin
      SPRING_DATASOURCE_USERNAME: tramplin_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-tramplin_secret}
      JWT_SECRET: ${JWT_SECRET:-my-super-secret-key-for-jwt-256-bits-long!!}
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data: