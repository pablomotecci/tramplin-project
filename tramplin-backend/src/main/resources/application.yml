# ============================================================
# Конфигурация приложения «Трамплин»
# ============================================================


server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  config:
    import:
      "optional:file:.env.properties"
  application:
    name: tramplin-backend

  # --- База данных ---
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tramplin}
    username: ${SPRING_DATASOURCE_USERNAME:tramplin_user}
    password: ${SPRING_DATASOURCE_PASSWORD:tramplin_secret}
    driver-class-name: org.postgresql.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: none  # Liquibase управляет схемой, Hibernate только валидирует
    properties:
      hibernate:
        format_sql: true
        # Защита от N+1: по умолчанию batch-загрузка
        default_batch_fetch_size: 20
    show-sql: true  # Для отладки (выключить в production)
    open-in-view: false  # Лучшая практика: не держать сессию открытой в контроллере

  # --- Liquibase (миграции) ---
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # --- Загрузка файлов ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

# --- JWT ---
app:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-for-jwt-256-bits-long!!}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}      # 15 минут
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 дней

  # --- Yandex Geocoder ---
  yandex:
    geocoder:
      api-key: ${YANDEX_GEOCODER_API_KEY}
      base-url: https://geocode-maps.yandex.ru/1.x/

  # --- CORS ---
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:80,http://localhost}

  # --- Загрузки ---
  upload:
    dir: ${UPLOAD_DIR:./uploads}

# --- Swagger / OpenAPI ---
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# --- Логирование ---
logging:
  level:
    tramplin: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
