databaseChangeLog:
  - changeSet:
      id: 003-create-applicant-profiles-table
      author: deadline_kids
      comment: "Таблица профилей соискателей (Связь 1:1 с users)"
      changes:
        - createTable:
            tableName: applicant_profiles
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: middle_name
                  type: VARCHAR(100)

              - column:
                  name: university
                  type: VARCHAR(255)

              - column:
                  name: course
                  type: INTEGER

              - column:
                  name: graduation_year
                  type: INTEGER

              - column:
                  name: bio
                  type: TEXT

              - column:
                  name: avatar_url
                  type: VARCHAR(255)

              - column:
                  name: phone
                  type: VARCHAR(20)

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: applicant_profiles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_applicant_profiles_user

      rollback:
        - dropTable:
            tableName: applicant_profiles