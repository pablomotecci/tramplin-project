databaseChangeLog:
  - changeSet:
      id: set-tag-hierarchy
      author: deadline_kids
      comment: "–£—Å—Ç–∞–Ω–æ–≤–∫–∞ parent_id –¥–ª—è –∏–µ—Ä–∞—Ä—Ö–∏–∏ —Ç–µ–≥–æ–≤: Frontend‚ÜíReact/Vue/Angular, Backend‚ÜíSpring/Django/FastAPI/NestJS/Node.js, Mobile‚ÜíKotlin, Data Science‚ÜíPython(–Ω–µ—Ç, Python ‚Äî —è–∑—ã–∫), DevOps‚ÜíDocker/Kubernetes"
      changes:
        - sql:
            sql: |
              -- Frontend ‚Üí React, Vue, Angular
              UPDATE tags SET parent_id = (SELECT id FROM tags WHERE name = 'Frontend')
              WHERE name IN ('React', 'Vue', 'Angular') AND parent_id IS NULL;

              -- Backend ‚Üí Spring, Django, FastAPI, NestJS, Node.js
              UPDATE tags SET parent_id = (SELECT id FROM tags WHERE name = 'Backend')
              WHERE name IN ('Spring', 'Django', 'FastAPI', 'NestJS', 'Node.js') AND parent_id IS NULL;

              -- DevOps ‚Üí Docker, Kubernetes
              UPDATE tags SET parent_id = (SELECT id FROM tags WHERE name = 'DevOps')
              WHERE name IN ('Docker', 'Kubernetes') AND parent_id IS NULL;