databaseChangeLog:
  - changeSet:
      id: 005-create-tags-table
      author: deadline_kids
      comment: "Таблицы тегов, синонимов и связи opportunity-tag"
      changes:
        - createTable:
            tableName: tags
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: category
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: approved
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

              - column:
                  name: parent_id
                  type: uuid

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: tags
            baseColumnNames: parent_id
            referencedTableName: tags
            referencedColumnNames: id
            constraintName: fk_tags_parent

        - createTable:
            tableName: tag_synonyms
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: synonym
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: tag_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: tag_synonyms
            baseColumnNames: tag_id
            referencedTableName: tags
            referencedColumnNames: id
            constraintName: fk_tag_synonyms_tag

        - createTable:
            tableName: opportunity_tags
            columns:
              - column:
                  name: opportunity_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: tag_id
                  type: uuid
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: opportunity_tags
            columnNames: opportunity_id, tag_id
            constraintName: pk_opportunity_tags

        - addForeignKeyConstraint:
            baseTableName: opportunity_tags
            baseColumnNames: opportunity_id
            referencedTableName: opportunities
            referencedColumnNames: id
            constraintName: fk_opportunity_tags_opportunity

        - addForeignKeyConstraint:
            baseTableName: opportunity_tags
            baseColumnNames: tag_id
            referencedTableName: tags
            referencedColumnNames: id
            constraintName: fk_opportunity_tags_tag

      rollback:
        - dropTable:
            tableName: opportunity_tags
        - dropTable:
            tableName: tag_synonyms
        - dropTable:
            tableName: tags

  - changeSet:
      id: 005-create-tags-indexes
      author: deadline_kids
      comment: "Индексы для таблиц тегов"
      changes:
        - createIndex:
            indexName: idx_tags_category
            tableName: tags
            columns:
              - column:
                  name: category

        - createIndex:
            indexName: idx_tags_approved
            tableName: tags
            columns:
              - column:
                  name: approved

        - createIndex:
            indexName: idx_tag_synonyms_tag_id
            tableName: tag_synonyms
            columns:
              - column:
                  name: tag_id

      rollback:
        - dropIndex:
            indexName: idx_tags_category
            tableName: tags
        - dropIndex:
            indexName: idx_tags_approved
            tableName: tags
        - dropIndex:
            indexName: idx_tag_synonyms_tag_id
            tableName: tag_synonyms


