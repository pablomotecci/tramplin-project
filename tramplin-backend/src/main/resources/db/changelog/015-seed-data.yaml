  # --- 10 PRIVACY SETTINGS ---
  - changeSet:
      id: seed-privacy-settings
      author: seed
      context: seed
      changes:
        - sql:
            sql: |
              INSERT INTO privacy_settings (id, applicant_id, profile_visibility, resume_visibility, applications_visibility, contacts_visibility, created_at, updated_at)
              SELECT gen_random_uuid(), ap.id, 'ALL', 'CONTACTS_ONLY', 'NOBODY', 'CONTACTS_ONLY', now(), now()
              FROM applicant_profiles ap
              JOIN users u ON ap.user_id = u.id
              WHERE u.role = 'APPLICANT'
              AND NOT EXISTS (SELECT 1 FROM privacy_settings ps WHERE ps.applicant_id = ap.id);

