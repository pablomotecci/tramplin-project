  # --- OPPORTUNITY_TAGS ---
  - changeSet:
      id: seed-opportunity-tags
      author: seed
      context: seed
      changes:
        - sql:
            sql: |
              -- Яндекс: Java Backend стажёр → Java, Spring, PostgreSQL, Docker, Intern
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Java Backend Developer (стажёр)' AND t.name IN ('Java', 'Spring', 'PostgreSQL', 'Docker', 'Intern');

              -- Яндекс: Frontend React → React, TypeScript, JavaScript, Frontend, Junior
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Frontend React Developer' AND t.name IN ('React', 'TypeScript', 'JavaScript', 'Frontend', 'Junior');

              -- Яндекс: Data Analyst Intern → Python, SQL, Data Science, Intern
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Data Analyst Intern' AND t.name IN ('Python', 'SQL', 'Data Science', 'Intern');

              -- Яндекс: Open Day → Java, Spring, Backend
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Яндекс Open Day: Backend' AND t.name IN ('Java', 'Spring', 'Backend');

              -- VK: Python Backend → Python, FastAPI, PostgreSQL, Backend, Middle
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Python Backend Developer' AND t.name IN ('Python', 'FastAPI', 'PostgreSQL', 'Backend', 'Middle');

              -- VK: Vue.js стажёр → Vue, TypeScript, JavaScript, Frontend, Intern
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Frontend Vue.js стажёр' AND t.name IN ('Vue', 'TypeScript', 'JavaScript', 'Frontend', 'Intern');

              -- VK: DevOps → Docker, Kubernetes, Linux, DevOps, Middle
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'DevOps Engineer' AND t.name IN ('Docker', 'Kubernetes', 'Linux', 'DevOps', 'Middle');

              -- VK: Менторство Mobile → Kotlin, Mobile, Android
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Менторство: Mobile Development' AND t.name IN ('Kotlin', 'Mobile');

              -- Сбер: Java Middle → Java, Spring, PostgreSQL, Backend, Middle
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Java Developer (Middle)' AND t.name IN ('Java', 'Spring', 'PostgreSQL', 'Backend', 'Middle');

              -- Сбер: DS стажёр → Python, SQL, Data Science, Intern
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Data Science стажёр' AND t.name IN ('Python', 'SQL', 'Data Science', 'Intern');

              -- Сбер: QA Automation → Java, Python, QA, Junior
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'QA Automation Engineer' AND t.name IN ('Java', 'Python', 'QA', 'Junior');

              -- Сбер: IT Day → Java, Python, Backend
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Сбер IT Day' AND t.name IN ('Java', 'Python', 'Backend');

              -- Тинькофф: Kotlin Backend → Kotlin, Spring, PostgreSQL, Backend, Middle
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Kotlin Backend Developer' AND t.name IN ('Kotlin', 'Spring', 'PostgreSQL', 'Backend', 'Middle');

              -- Тинькофф: React стажёр → React, TypeScript, JavaScript, Frontend, Intern
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
              WHERE o.title = 'Frontend React стажёр' AND t.name IN ('React', 'TypeScript', 'JavaScript', 'Frontend', 'Intern');

              -- Тинькофф: Fullstack → Node.js, React, PostgreSQL, Fullstack, Junior
              INSERT INTO opportunity_tags (opportunity_id, tag_id)
              SELECT o.id, t.id FROM opportunities o, tags t
