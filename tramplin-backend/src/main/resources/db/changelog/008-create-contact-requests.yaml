databaseChangeLog:
  - changeSet:
      id: 008-create-contact-requests-table
      author: deadline_kids
      comment: "Таблица запросов на контакт между соискателями"
      changes:
        - createTable:
            tableName: contact_requests
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: sender_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: receiver_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: 'PENDING'
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: contact_requests
            baseColumnNames: sender_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_contact_requests_sender

        - addForeignKeyConstraint:
            baseTableName: contact_requests
            baseColumnNames: receiver_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_contact_requests_receiver

        - addUniqueConstraint:
            tableName: contact_requests
            columnNames: sender_id, receiver_id
            constraintName: uq_contact_requests_sender_receiver

        - createIndex:
            indexName: idx_contact_requests_sender_id
            tableName: contact_requests
            columns:
              - column:
                  name: sender_id

        - createIndex:
            indexName: idx_contact_requests_receiver_id
            tableName: contact_requests
            columns:
              - column:
                  name: receiver_id

      rollback:
        - dropTable:
            tableName: contact_requests